# Path-based PR labels (actions/labeler v6). Pre-create matching labels on the repo.
# https://github.com/actions/labeler
#
# Note: `changed-files-labels-limit` / `max-files-changed` are documented upstream but not
# implemented in labeler@v6.0.x yet (they are parsed as label names → type error). Re-add when
# a v6 release includes TOP_LEVEL_OPTIONS handling (see actions/labeler main branch).

area/frontend:
  - changed-files:
      - any-glob-to-any-file: 'apps/frontend/**'

area/backend:
  - changed-files:
      - any-glob-to-any-file: 'apps/backend/**'

area/kiosk:
  - changed-files:
      - any-glob-to-any-file: 'apps/kiosk-desktop/**'

area/shared:
  - changed-files:
      - any-glob-to-any-file: 'packages/**'

area/ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - 'nx.json'
          - 'pnpm-workspace.yaml'
          - 'pnpm-lock.yaml'

documentation:
  - changed-files:
      - any-glob-to-any-file: 'docs/**'

release-pr:
  - base-branch: '^release$'
