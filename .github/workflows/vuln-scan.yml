name: Vulnerability scan

on:
  pull_request:
    paths:
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'apps/frontend/package.json'
      - 'apps/backend/go.mod'
      - 'apps/backend/go.sum'
      - 'packages/**/package.json'
      - '.github/workflows/vuln-scan.yml'
  merge_group:

permissions:
  contents: read

jobs:
  pnpm-audit:
    name: pnpm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # npm retired POST /-/npm/v1/security/audits (410). pnpm ≤10.33 still uses it (pnpm/pnpm#11265).
      # OSV-Scanner reads pnpm-lock.yaml and queries OSV.dev; we fail only on CVSS ≥ 7 to match --audit-level=high.
      - name: Lockfile audit (OSV, high+ only)
        run: |
          set -euo pipefail
          docker run --rm -v "${GITHUB_WORKSPACE}:/src:ro" ghcr.io/google/osv-scanner:v2.3.5 \
            scan source -L /src/pnpm-lock.yaml --format json --verbosity error \
            > osv-results.json || true
          node <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('osv-results.json', 'utf8').trim();
          if (!raw) {
            console.error('OSV-Scanner produced no output (registry or image failure).');
            process.exit(1);
          }
          const data = JSON.parse(raw);
          let worst = 0;
          for (const r of data.results ?? []) {
            for (const pkg of r.packages ?? []) {
              for (const g of pkg.groups ?? []) {
                const n = parseFloat(g.max_severity);
                if (!Number.isNaN(n)) worst = Math.max(worst, n);
              }
            }
          }
          const HIGH = 7.0;
          if (worst >= HIGH) {
            console.error(
              `Failing: highest CVSS in pnpm-lock.yaml is ${worst} (threshold ${HIGH}, same band as npm audit --audit-level=high).`
            );
            process.exit(1);
          }
          console.log(
            worst > 0
              ? `OSV: max CVSS ${worst} is below high threshold (${HIGH}); not failing the job.`
              : 'OSV: no known vulnerabilities in pnpm-lock.yaml.'
          );
          process.exit(0);
          NODE
          rm -f osv-results.json

  govulncheck:
    name: govulncheck (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Patched stdlib (e.g. crypto/tls, crypto/x509) is only fixed in Go 1.26.2+;
      # pin explicitly so govulncheck never runs on an older 1.26.x from the runner cache.
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache-dependency-path: apps/backend/go.sum

      - name: Run govulncheck
        working-directory: apps/backend
        env:
          GOTOOLCHAIN: go1.26.2
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
