# One-time (or occasional) upsert of labels used by .github/labeler.yml.
# Run: Actions → "Sync PR labels" → Run workflow.
name: Sync PR labels

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = [
              { name: 'area/frontend', color: '0052CC', description: 'Changes under apps/frontend' },
              { name: 'area/backend', color: '1D76DB', description: 'Changes under apps/backend' },
              { name: 'area/kiosk', color: '5319E7', description: 'Changes under apps/kiosk-desktop' },
              { name: 'area/shared', color: 'FBCA04', description: 'Changes under packages/' },
              { name: 'area/ci', color: 'C5DEF5', description: 'CI, Nx, pnpm workspace, GitHub Actions' },
              { name: 'Documentation', color: '0075CA', description: 'Root docs/ tree' },
              { name: 'release-pr', color: 'B60205', description: 'Pull request targets the release branch' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
              } catch (e) {
                if (e.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner,
                    repo,
                    name: label.name,
                    new_name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                } else {
                  throw e;
                }
              }
            }
