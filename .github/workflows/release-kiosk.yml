name: Release Kiosk Desktop

on:
  push:
    branches:
      - main
    paths:
      - 'apps/kiosk-desktop/**'
      - 'packages/**'
      - '.github/workflows/release-kiosk.yml'

concurrency:
  group: release-kiosk-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-affected:
    name: Check if kiosk-desktop is affected
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.check.outputs.affected }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if kiosk-desktop affected
        id: check
        run: |
          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}
          
          if pnpm nx show projects --affected --base=$BASE --head=$HEAD | grep -q "kiosk-desktop"; then
            echo "affected=true" >> $GITHUB_OUTPUT
          else
            echo "affected=false" >> $GITHUB_OUTPUT
          fi

  bump:
    name: Version bump
    needs: check-affected
    if: needs.check-affected.outputs.affected == 'true' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine bump type
        id: vtype
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[major]"* ]] || [[ "$COMMIT_MSG" == *"BREAKING CHANGE"* ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ "$COMMIT_MSG" == *"[minor]"* ]] || [[ "$COMMIT_MSG" == *"feat:"* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: bump_run
        working-directory: apps/kiosk-desktop
        run: |
          TYPE=${{ steps.vtype.outputs.type }}
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}

          if [ "$TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"
          
          # Update package.json
          npm version $NEW_VERSION --no-git-tag-version
          
          # Update Cargo.toml
          sed -i.bak "s/^version = .*/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml
          rm src-tauri/Cargo.toml.bak || true
          
          # Update tauri.conf.json
          node -e "const fs=require('fs');const conf=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json'));conf.version='$NEW_VERSION';fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(conf,null,2));"

      - name: Commit, push, tag
        id: tag
        env:
          VERSION: ${{ steps.bump_run.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/kiosk-desktop/package.json apps/kiosk-desktop/src-tauri/Cargo.toml apps/kiosk-desktop/src-tauri/tauri.conf.json
          git commit -m "chore(kiosk): bump version to ${VERSION} [skip ci]"
          git tag "v${VERSION}-kiosk"
          git push origin main
          git push origin "v${VERSION}-kiosk"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-kiosk" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.os }})
    needs: bump
    if: ${{ always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        working-directory: apps/kiosk-desktop
        run: pnpm install --frozen-lockfile

      - name: Build agent
        working-directory: apps/kiosk-desktop
        run: node scripts/build-agent.mjs

      - name: Build app
        working-directory: apps/kiosk-desktop
        run: pnpm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}
          path: apps/kiosk-desktop/src-tauri/target/release/bundle/

  release:
    name: GitHub Release
    needs: [bump, build]
    if: ${{ success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get version
        id: ver
        working-directory: apps/kiosk-desktop
        run: |
          V=$(node -p "require('./package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V-kiosk" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bundle-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: QuokkaQ Kiosk ${{ steps.ver.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: false
          make_latest: true
          allowUpdates: true
