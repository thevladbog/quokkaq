# Compares vulnerability scan of base vs PR branch (see https://google.github.io/osv-scanner/github-action/).
name: OSV-Scanner PR

on:
  pull_request:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-pr:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.5
