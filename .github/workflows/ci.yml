name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_PUBLIC_API_URL: http://localhost:3001
  NEXT_PUBLIC_WS_URL: ws://localhost:3001

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Merge queue builds must not be cancelled by newer queue entries on the same ref pattern.
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  affected:
    name: Detect affected apps
    runs-on: ubuntu-latest
    env:
      # Same base/head as build-and-test so "kiosk affected" matches nx affected -t build
      NX_BASE: ${{ github.event.merge_group.base_sha || github.event.pull_request.base.sha || github.event.before || 'origin/main' }}
      NX_HEAD: ${{ github.event.merge_group.head_sha || github.sha }}
    outputs:
      frontend: ${{ steps.check.outputs.frontend }}
      backend: ${{ steps.check.outputs.backend }}
      kiosk: ${{ steps.check.outputs.kiosk }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Debug lockfile integrity
        run: |
          echo "=== Lockfile first 10 lines ==="
          head -10 pnpm-lock.yaml
          echo "=== Check for YAML document separators ==="
          if grep -n "^---$" pnpm-lock.yaml 2>/dev/null; then
            echo "ERROR: Found document separators"
            exit 1
          else
            echo "No document separators found"
          fi
          echo "=== Check for conflict markers ==="
          if grep -n "^<<<<<<< " pnpm-lock.yaml 2>/dev/null; then
            echo "ERROR: Found conflict markers"
            exit 1
          else
            echo "No conflict markers found"
          fi
          echo "=== Lockfile stats ==="
          wc -l pnpm-lock.yaml
          echo "=== Try loading with Python YAML parser ==="
          python3 -c "import yaml; docs=list(yaml.safe_load_all(open('pnpm-lock.yaml'))); print(f'Documents: {len(docs)}')"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check affected apps
        id: check
        run: |
          AFFECTED="$(pnpm nx show projects --affected --base=$NX_BASE --head=$NX_HEAD)"

          if echo "$AFFECTED" | grep -q "frontend"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$AFFECTED" | grep -q "backend"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$AFFECTED" | grep -q "kiosk-desktop"; then
            echo "kiosk=true" >> $GITHUB_OUTPUT
          else
            echo "kiosk=false" >> $GITHUB_OUTPUT
          fi

  build-and-test:
    name: Build and test affected
    runs-on: ubuntu-latest
    needs: affected
    if: ${{ needs.affected.outputs.frontend == 'true' || needs.affected.outputs.backend == 'true' || needs.affected.outputs.kiosk == 'true' }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      NX_BASE: ${{ github.event.merge_group.base_sha || github.event.pull_request.base.sha || github.event.before || 'origin/main' }}
      NX_HEAD: ${{ github.event.merge_group.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-go@v6
        if: needs.affected.outputs.backend == 'true'
        with:
          go-version-file: apps/backend/go.mod

      # Always on this runner: nx affected can include kiosk-desktop even if the detect job
      # previously disagreed (e.g. base/head drift). GTK/WebKit are required for tauri build on Linux.
      - name: Install Tauri / GTK system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            libssl-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libudev-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        if: needs.affected.outputs.kiosk == 'true'

      - name: Debug lockfile integrity
        run: |
          echo "=== Lockfile first 10 lines ==="
          head -10 pnpm-lock.yaml
          echo "=== Check for YAML document separators ==="
          if grep -n "^---$" pnpm-lock.yaml 2>/dev/null; then
            echo "ERROR: Found document separators"
            exit 1
          else
            echo "No document separators found"
          fi
          echo "=== Check for conflict markers ==="
          if grep -n "^<<<<<<< " pnpm-lock.yaml 2>/dev/null; then
            echo "ERROR: Found conflict markers"
            exit 1
          else
            echo "No conflict markers found"
          fi
          echo "=== Lockfile stats ==="
          wc -l pnpm-lock.yaml
          echo "=== Try loading with Python YAML parser ==="
          python3 -c "import yaml; docs=list(yaml.safe_load_all(open('pnpm-lock.yaml'))); print(f'Documents: {len(docs)}')"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check pnpm workspace (sherif)
        # apps/backend is Go-only (no package.json); allow that workspace quirk.
        run: pnpm exec sherif -r packages-without-package-json

      - name: Verify OpenAPI 3 artifacts match doc pipeline (backend)
        if: needs.affected.outputs.backend == 'true'
        working-directory: apps/backend
        run: |
          python3 -m pip install --user 'PyYAML>=6.0,<7'
          go run github.com/swaggo/swag/cmd/swag@v1.16.6 init -g cmd/api/main.go -o ./docs
          go run ./cmd/swagger-to-openapi3
          python3 scripts/post_swagger_openapi_tweaks.py
          git diff --exit-code docs/docs.go docs/swagger.json docs/swagger.yaml

      - name: Prettier (frontend)
        if: needs.affected.outputs.frontend == 'true'
        run: pnpm nx run frontend:format:check

      - name: Orval client in sync with OpenAPI (frontend / backend docs)
        if: needs.affected.outputs.frontend == 'true' || needs.affected.outputs.backend == 'true'
        run: pnpm nx run frontend:orval:check

      - name: Build affected
        run: pnpm nx affected -t build --base=$NX_BASE --head=$NX_HEAD

      - name: Test affected (non-backend)
        run: pnpm nx affected -t test --base=$NX_BASE --head=$NX_HEAD --skip-nx-cache --exclude=backend

      - name: Test affected backend (coverage)
        run: pnpm nx affected -t test:ci --base=$NX_BASE --head=$NX_HEAD --skip-nx-cache

      - name: Lint affected
        run: pnpm nx affected -t lint --base=$NX_BASE --head=$NX_HEAD --skip-nx-cache

      - name: Publish Vitest JUnit results
        if: always() && hashFiles('apps/frontend/test-results/vitest-junit.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        with:
          files: apps/frontend/test-results/vitest-junit.xml
          check_name: Vitest (frontend)
          # PR comments only; merge_group/push still get the check run + job summary.
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Upload coverage to Codecov (frontend)
        if: always() && hashFiles('apps/frontend/coverage/lcov.info') != ''
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Upload coverage to Codecov (backend)
        if: always() && hashFiles('apps/backend/coverage.out') != ''
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/backend/coverage.out
          flags: backend
          fail_ci_if_error: false
