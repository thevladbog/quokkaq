name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_PUBLIC_API_URL: http://localhost:3001
  NEXT_PUBLIC_WS_URL: ws://localhost:3001

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  affected:
    name: Detect affected apps
    runs-on: ubuntu-latest
    env:
      # Same base/head as build-and-test so "kiosk affected" matches nx affected -t build
      NX_BASE: ${{ github.event.pull_request.base.sha || github.event.before || 'origin/main' }}
      NX_HEAD: ${{ github.sha }}
    outputs:
      frontend: ${{ steps.check.outputs.frontend }}
      backend: ${{ steps.check.outputs.backend }}
      kiosk: ${{ steps.check.outputs.kiosk }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check affected apps
        id: check
        run: |
          # Check if frontend is affected
          if pnpm nx show projects --affected --base=$NX_BASE --head=$NX_HEAD | grep -q "frontend"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi
          
          # Check if backend is affected
          if pnpm nx show projects --affected --base=$NX_BASE --head=$NX_HEAD | grep -q "backend"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          
          # Check if kiosk-desktop is affected
          if pnpm nx show projects --affected --base=$NX_BASE --head=$NX_HEAD | grep -q "kiosk-desktop"; then
            echo "kiosk=true" >> $GITHUB_OUTPUT
          else
            echo "kiosk=false" >> $GITHUB_OUTPUT
          fi

  build-and-test:
    name: Build and test affected
    runs-on: ubuntu-latest
    needs: affected
    if: ${{ needs.affected.outputs.frontend == 'true' || needs.affected.outputs.backend == 'true' || needs.affected.outputs.kiosk == 'true' }}
    env:
      NX_BASE: ${{ github.event.pull_request.base.sha || github.event.before || 'origin/main' }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-go@v5
        if: needs.affected.outputs.backend == 'true'
        with:
          go-version: '1.26'

      # Always on this runner: nx affected can include kiosk-desktop even if the detect job
      # previously disagreed (e.g. base/head drift). GTK/WebKit are required for tauri build on Linux.
      - name: Install Tauri / GTK system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            libssl-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libudev-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        if: needs.affected.outputs.kiosk == 'true'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier (frontend)
        if: needs.affected.outputs.frontend == 'true'
        run: pnpm nx run frontend:format:check

      - name: Build affected
        run: pnpm nx affected -t build --base=$NX_BASE --head=$NX_HEAD

      - name: Test affected
        run: pnpm nx affected -t test --base=$NX_BASE --head=$NX_HEAD --skip-nx-cache || true

      - name: Lint affected
        run: pnpm nx affected -t lint --base=$NX_BASE --head=$NX_HEAD --skip-nx-cache || true
