name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  affected:
    name: Detect affected apps
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.check.outputs.frontend }}
      backend: ${{ steps.check.outputs.backend }}
      kiosk: ${{ steps.check.outputs.kiosk }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check affected apps
        id: check
        run: |
          BASE=${{ github.event.before || 'origin/main' }}
          HEAD=${{ github.sha }}
          
          # Check if frontend is affected
          if pnpm nx show projects --affected --base=$BASE --head=$HEAD | grep -q "frontend"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi
          
          # Check if backend is affected
          if pnpm nx show projects --affected --base=$BASE --head=$HEAD | grep -q "backend"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          
          # Check if kiosk-desktop is affected
          if pnpm nx show projects --affected --base=$BASE --head=$HEAD | grep -q "kiosk-desktop"; then
            echo "kiosk=true" >> $GITHUB_OUTPUT
          else
            echo "kiosk=false" >> $GITHUB_OUTPUT
          fi

  build-and-test:
    name: Build and test affected
    runs-on: ubuntu-latest
    needs: affected
    if: ${{ needs.affected.outputs.frontend == 'true' || needs.affected.outputs.backend == 'true' || needs.affected.outputs.kiosk == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-go@v5
        if: needs.affected.outputs.backend == 'true'
        with:
          go-version: '1.26'

      - name: Install Tauri system dependencies
        if: needs.affected.outputs.kiosk == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        if: needs.affected.outputs.kiosk == 'true'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build affected
        run: pnpm nx affected -t build --base=origin/main --head=HEAD

      - name: Test affected
        run: pnpm nx affected -t test --base=origin/main --head=HEAD --skip-nx-cache || true

      - name: Lint affected
        run: pnpm nx affected -t lint --base=origin/main --head=HEAD --skip-nx-cache || true
