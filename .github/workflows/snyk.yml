# Optional SCA: add repository secret SNYK_TOKEN, then this job runs on PRs and manual dispatch.
# Without the secret the job is skipped. Complements Dependabot, govulncheck, and OSV workflows.
name: Snyk (optional)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        if: env.SNYK_TOKEN != ''

      - uses: pnpm/action-setup@v6
        if: env.SNYK_TOKEN != ''

      - uses: actions/setup-node@v6
        if: env.SNYK_TOKEN != ''
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        if: env.SNYK_TOKEN != ''
        run: pnpm install --frozen-lockfile

      - name: Snyk test (monorepo)
        if: env.SNYK_TOKEN != ''
        run: npx snyk test --all-projects --severity-threshold=high
