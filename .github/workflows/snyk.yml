# Optional SCA: add repository secret SNYK_TOKEN, then this job runs on PRs and manual dispatch.
# Without the secret the job is skipped. Complements Dependabot, govulncheck, and OSV workflows.
name: Snyk (optional)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-latest
    if: ${{ secrets.SNYK_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Snyk test (monorepo)
        run: npx snyk test --all-projects --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
