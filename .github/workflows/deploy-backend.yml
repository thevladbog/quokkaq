name: Deploy Backend

on:
  push:
    branches:
      - release
    paths:
      - 'apps/backend/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: quokkaq-release-writes-${{ github.repository }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check-affected:
    name: Check if backend is affected
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.check.outputs.affected }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if backend affected
        id: check
        run: |
          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}

          if pnpm nx show projects --affected --base=$BASE --head=$HEAD | grep -q "backend"; then
            echo "affected=true" >> $GITHUB_OUTPUT
          else
            echo "affected=false" >> $GITHUB_OUTPUT
          fi

  version-bump:
    name: Bump version
    needs: check-affected
    if: needs.check-affected.outputs.affected == 'true' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: release
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Determine version bump type
        id: version_type
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          if [[ "$COMMIT_MSG" == *"[major]"* ]] || [[ "$COMMIT_MSG" == *"BREAKING CHANGE"* ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" == *"[minor]"* ]] || [[ "$COMMIT_MSG" == *"feat:"* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump
        working-directory: apps/backend
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          TYPE=${{ steps.version_type.outputs.type }}
          echo "Bumping version type: $TYPE"

          CURRENT_VERSION=$(cat VERSION)
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}

          if [ "$TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          echo "$NEW_VERSION" > VERSION

          cd ../..
          RELEASE_BRANCH=release
          TAG_NAME="v${NEW_VERSION}-backend"

          git add apps/backend/VERSION
          git commit -m "chore(backend): bump version to $NEW_VERSION [skip ci]"

          for attempt in 1 2 3 4 5; do
            git fetch origin "$RELEASE_BRANCH"
            if ! git rebase "origin/$RELEASE_BRANCH"; then
              echo "::error::Rebase onto origin/${RELEASE_BRANCH} failed (resolve conflicts locally if this persists)"
              git rebase --abort || true
              exit 1
            fi
            git tag -f "$TAG_NAME"
            if git push origin "HEAD:refs/heads/${RELEASE_BRANCH}" && git push -f origin "$TAG_NAME"; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Push failed after 5 attempts"
              exit 1
            fi
            sleep $((attempt * 5))
          done

  build-and-deploy:
    name: Build and deploy to Yandex Cloud
    needs: version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.version-bump.outputs.new_version }}-backend

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/quokkaq-backend:${{ needs.version-bump.outputs.new_version }}
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/quokkaq-backend:latest

      - name: Copy Docker Compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "apps/backend/docker-compose.prod.yml"
          target: "~/quokkaq-backend/"
          strip_components: 2
          debug: true

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: YC_SA_JSON_CREDENTIALS
          script: |
            export YC_REGISTRY_ID=${{ secrets.YC_REGISTRY_ID }}
            export TAG=${{ needs.version-bump.outputs.new_version }}

            # Export secrets as env vars for docker-compose
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            export REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            export MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
            export MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            export SMTP_HOST=${{ secrets.SMTP_HOST }}
            export SMTP_PORT=${{ secrets.SMTP_PORT }}
            export SMTP_USER=${{ secrets.SMTP_USER }}
            export SMTP_PASS=${{ secrets.SMTP_PASS }}
            export SMTP_FROM=${{ secrets.SMTP_FROM }}
            export SMTP_SECURE=${{ secrets.SMTP_SECURE }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export APP_BASE_URL=${{ secrets.APP_BASE_URL }}
            export AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            export ACME_EMAIL=${{ secrets.ACME_EMAIL }}

            echo "Deploying backend version $TAG"

            echo "$YC_SA_JSON_CREDENTIALS" | docker login --username json_key --password-stdin cr.yandex

            docker pull cr.yandex/$YC_REGISTRY_ID/quokkaq-backend:$TAG

            cd ~/quokkaq-backend

            docker network create traefik-public || true

            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f
