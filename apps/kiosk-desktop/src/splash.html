<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>QuokkaQ Kiosk</title>
    <style>
      :root {
        --bg: #0f1419;
        --card: #1a2332;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-dim: rgba(56, 189, 248, 0.25);
        --radius: 12px;
      }
      * {
        box-sizing: border-box;
      }
      .lang-switch {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 100;
        display: flex;
        gap: 2px;
        padding: 3px;
        border-radius: 999px;
        background: rgba(26, 35, 50, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.18);
        backdrop-filter: blur(8px);
      }
      .lang-switch button {
        width: auto;
        min-width: 2.5rem;
        margin: 0;
        padding: 6px 10px;
        font-size: 0.8125rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        border: none;
        box-shadow: none;
      }
      .lang-switch button:hover:not(:disabled) {
        color: var(--text);
        background: rgba(148, 163, 184, 0.1);
      }
      .lang-switch button.active {
        color: var(--accent);
        background: var(--accent-dim);
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: radial-gradient(
            ellipse 80% 60% at 50% -20%,
            rgba(56, 189, 248, 0.12),
            transparent
          ),
          var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        margin-bottom: 28px;
      }
      .mascot {
        width: min(200px, 42vw);
        height: auto;
        filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.35));
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border-radius: var(--radius);
        padding: 24px;
        border: 1px solid rgba(148, 163, 184, 0.12);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        margin: 0 0 6px;
      }
      .sub {
        font-size: 0.875rem;
        color: var(--muted);
        margin: 0 0 20px;
        line-height: 1.45;
      }
      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(15, 20, 25, 0.6);
        color: var(--text);
        font-size: 0.9375rem;
        margin-bottom: 16px;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      button {
        width: 100%;
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        color: #fff;
        font-weight: 600;
        font-size: 0.9375rem;
        cursor: pointer;
        margin-top: 4px;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      button.secondary {
        margin-top: 10px;
        background: transparent;
        color: var(--muted);
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: none;
      }
      button.secondary:hover:not(:disabled) {
        color: var(--text);
        border-color: rgba(148, 163, 184, 0.55);
        background: rgba(148, 163, 184, 0.08);
      }
      .reset-hint {
        font-size: 0.8125rem;
        color: var(--muted);
        margin-top: 18px;
        line-height: 1.45;
      }
      .error {
        color: #f87171;
        font-size: 0.8125rem;
        margin-top: 12px;
        line-height: 1.4;
      }
      .progress-wrap {
        margin-top: 24px;
        max-width: 420px;
        width: 100%;
      }
      .progress-label {
        font-size: 0.75rem;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .progress-track {
        height: 6px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.15);
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), #818cf8);
        transition: width 0.35s ease;
      }
      .progress-bar.indeterminate {
        width: 40% !important;
        animation: slide 1.2s ease-in-out infinite;
      }
      @keyframes slide {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(350%);
        }
      }
    </style>
  </head>
  <body>
    <div
      class="lang-switch"
      role="group"
      aria-label="Language"
      id="lang-switch"
    >
      <button type="button" id="lang-en" data-locale="en">EN</button>
      <button type="button" id="lang-ru" data-locale="ru">RU</button>
    </div>

    <div class="brand">
      <img
        class="mascot"
        src="splash-assets/quokka-logo.svg"
        alt=""
        width="200"
        height="200"
      />
    </div>

    <div class="card">
      <h1 id="i18n-title">Connect this kiosk</h1>
      <p class="sub" id="i18n-sub">
        Enter your API base URL (same host the backend uses) and the pairing
        code from Admin → Desktop terminals.
      </p>
      <form id="form">
        <label for="api" id="i18n-label-api">API base URL</label>
        <input
          id="api"
          name="api"
          type="url"
          placeholder="https://api.example.com"
          autocomplete="off"
          required
        />
        <label for="code" id="i18n-label-code">Terminal pairing code</label>
        <input
          id="code"
          name="code"
          type="text"
          placeholder="10-character code"
          autocomplete="off"
          required
        />
        <button type="submit" id="submit">Connect</button>
        <div class="error" id="err" hidden></div>
      </form>
      <p class="reset-hint" id="i18n-reset-hint">
        If this device was paired before but the kiosk no longer loads (wrong API, expired
        terminal, or a blank screen), clear saved data and set it up again.
      </p>
      <button type="button" class="secondary" id="reset-pairing">
        Clear saved pairing &amp; start over
      </button>
    </div>

    <div class="progress-wrap">
      <div class="progress-label" id="prog-label">Starting…</div>
      <div class="progress-track">
        <div class="progress-bar" id="prog-bar"></div>
      </div>
    </div>

    <script>
      (function () {
        var LOCALE_KEY = 'quokkaq_splash_locale';

        var STR = {
          en: {
            pageTitle: 'QuokkaQ Kiosk',
            title: 'Connect this kiosk',
            sub:
              'Enter your API base URL (same host the backend uses) and the pairing code from Admin → Desktop terminals.',
            labelApi: 'API base URL',
            labelCode: 'Terminal pairing code',
            phApi: 'https://api.example.com',
            phCode: '10-character code',
            submit: 'Connect',
            resetHint:
              'If this device was paired before but the kiosk no longer loads (wrong API, expired terminal, or a blank screen), clear saved data and set it up again.',
            resetBtn: 'Clear saved pairing & start over',
            errNoTauri:
              'Tauri API not available. Open this app from the QuokkaQ Kiosk desktop build.',
            progStart: 'Starting…',
            progAgent: 'Starting print agent…',
            progConfig: 'Loading configuration…',
            progAlmost: 'Almost ready…',
            progDone: 'Done',
            connecting: 'Connecting to API…',
            opening: 'Opening kiosk…',
            connFailed: 'Connection failed',
            couldNotConnect: 'Could not connect',
            clearing: 'Clearing saved pairing…',
            readyAgain: 'Ready — enter API URL and pairing code above',
            couldNotReset: 'Could not reset',
            resetFailed: 'Reset failed',
            langAria: 'Language'
          },
          ru: {
            pageTitle: 'QuokkaQ — киоск',
            title: 'Подключите киоск',
            sub:
              'Укажите базовый URL API (тот же хост, что у бэкенда) и код сопряжения из Админка → Настольные терминалы.',
            labelApi: 'Базовый URL API',
            labelCode: 'Код сопряжения терминала',
            phApi: 'https://api.example.com',
            phCode: 'Код из 10 символов',
            submit: 'Подключить',
            resetHint:
              'Если киоск уже сопряжён, но не открывается (неверный API, истёк терминал или пустой экран), очистите сохранённые данные и настройте заново.',
            resetBtn: 'Сбросить сопряжение и начать сначала',
            errNoTauri:
              'API Tauri недоступен. Откройте приложение из сборки QuokkaQ Kiosk для десктопа.',
            progStart: 'Запуск…',
            progAgent: 'Запуск агента печати…',
            progConfig: 'Загрузка настроек…',
            progAlmost: 'Почти готово…',
            progDone: 'Готово',
            connecting: 'Подключение к API…',
            opening: 'Открываем киоск…',
            connFailed: 'Ошибка подключения',
            couldNotConnect: 'Не удалось подключиться',
            clearing: 'Очистка сохранённого сопряжения…',
            readyAgain: 'Готово — введите URL API и код выше',
            couldNotReset: 'Не удалось сбросить',
            resetFailed: 'Сброс не удался',
            langAria: 'Язык'
          }
        };

        function getLocale() {
          try {
            var s = localStorage.getItem(LOCALE_KEY);
            if (s === 'ru' || s === 'en') return s;
          } catch (e) {}
          if (
            navigator.language &&
            navigator.language.toLowerCase().indexOf('ru') === 0
          ) {
            return 'ru';
          }
          return 'en';
        }

        var locale = getLocale();

        function t(key) {
          var pack = STR[locale] || STR.en;
          return pack[key] != null ? pack[key] : STR.en[key] || key;
        }

        function applyLocale(lang) {
          locale = lang === 'ru' ? 'ru' : 'en';
          try {
            localStorage.setItem(LOCALE_KEY, locale);
          } catch (e) {}
          document.documentElement.lang = locale;
          document.title = t('pageTitle');
          document.getElementById('i18n-title').textContent = t('title');
          document.getElementById('i18n-sub').textContent = t('sub');
          document.getElementById('i18n-label-api').textContent = t('labelApi');
          document.getElementById('i18n-label-code').textContent =
            t('labelCode');
          document.getElementById('api').placeholder = t('phApi');
          document.getElementById('code').placeholder = t('phCode');
          document.getElementById('submit').textContent = t('submit');
          document.getElementById('i18n-reset-hint').textContent =
            t('resetHint');
          document.getElementById('reset-pairing').textContent = t('resetBtn');
          document.getElementById('lang-switch').setAttribute(
            'aria-label',
            t('langAria')
          );
          document.getElementById('lang-en').classList.toggle(
            'active',
            locale === 'en'
          );
          document.getElementById('lang-ru').classList.toggle(
            'active',
            locale === 'ru'
          );
          var progLabelEl = document.getElementById('prog-label');
          if (progLabelEl && !window.__splashProgressDone) {
            progLabelEl.textContent = t('progStart');
          }
        }

        var bar = document.getElementById('prog-bar');
        var label = document.getElementById('prog-label');

        document.getElementById('lang-en').addEventListener('click', function () {
          applyLocale('en');
        });
        document.getElementById('lang-ru').addEventListener('click', function () {
          applyLocale('ru');
        });

        applyLocale(locale);
        var steps = [
          { pct: 22, key: 'progAgent' },
          { pct: 48, key: 'progConfig' },
          { pct: 72, key: 'progAlmost' },
          { pct: 100, key: 'progDone' }
        ];
        var i = 0;
        function tick() {
          if (i >= steps.length) {
            window.__splashProgressDone = true;
            return;
          }
          bar.style.width = steps[i].pct + '%';
          label.textContent = t(steps[i].key);
          i++;
          setTimeout(tick, i < steps.length ? 450 : 0);
        }
        tick();

        var form = document.getElementById('form');
        var err = document.getElementById('err');
        var submit = document.getElementById('submit');

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          err.hidden = true;
          var api = document.getElementById('api').value.trim();
          var code = document.getElementById('code').value.trim();
          if (!api || !code) return;

          var tauri = window.__TAURI__;
          if (!tauri || !tauri.core || !tauri.core.invoke) {
            err.textContent = t('errNoTauri');
            err.hidden = false;
            return;
          }

          submit.disabled = true;
          bar.classList.add('indeterminate');
          label.textContent = t('connecting');

          try {
            await tauri.core.invoke('pair_terminal', {
              apiBaseUrl: api,
              pairingCode: code
            });
            label.textContent = t('opening');
          } catch (ex) {
            bar.classList.remove('indeterminate');
            err.textContent =
              (ex && (ex.message || String(ex))) || t('connFailed');
            err.hidden = false;
            submit.disabled = false;
            label.textContent = t('couldNotConnect');
          }
        });

        document
          .getElementById('reset-pairing')
          .addEventListener('click', async function () {
            err.hidden = true;
            var tauri = window.__TAURI__;
            if (!tauri || !tauri.core || !tauri.core.invoke) {
              err.textContent = t('errNoTauri');
              err.hidden = false;
              return;
            }
            var btn = document.getElementById('reset-pairing');
            btn.disabled = true;
            label.textContent = t('clearing');
            bar.classList.add('indeterminate');
            try {
              await tauri.core.invoke('reset_desktop_pairing');
              label.textContent = t('readyAgain');
            } catch (ex) {
              err.textContent =
                (ex && (ex.message || String(ex))) || t('couldNotReset');
              err.hidden = false;
              label.textContent = t('resetFailed');
            } finally {
              bar.classList.remove('indeterminate');
              bar.style.width = '0%';
              btn.disabled = false;
            }
          });
      })();
    </script>
  </body>
</html>
