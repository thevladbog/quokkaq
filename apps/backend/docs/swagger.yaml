        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: No company found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update current user's company (tenant admin)
      tags:
      - companies
  /companies/me/complete-onboarding:
