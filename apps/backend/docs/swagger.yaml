  /units/{unitId}/statistics/timeseries:
    get:
      description: |-
        Daily metrics from statistics warehouse; single calendar day without operator filter yields hourly points with per-hour recomputed wait/service/SLA (same rules as daily rollup). Requires unit branch access and statistics scope (self or ACCESS_STATISTICS_* / supervisor / admin).
        Wait averages use queue time after the last ticket.transferred before the call. Service averages sum in_service episodes from ticket_histories (split by transfer / return-to-queue / recall / terminal status); warehouse service_count is the number of those segments with positive duration.
      operationId: getUnitStatisticsTimeseries
      parameters:
      - description: Subdivision unit ID
        in: path
        name: unitId
        required: true
        type: string
      - description: YYYY-MM-DD
        in: query
        name: dateFrom
        required: true
        type: string
      - description: YYYY-MM-DD
        in: query
        name: dateTo
        required: true
        type: string
      - default: wait_time
        description: wait_time|service_time|volume|sla_wait
        in: query
        name: metric
        type: string
      - description: Filter by operator (expanded scope only)
        in: query
        name: userId
        type: string
      - description: Service zone unit id (child of subdivision); omit for allowed
          scope default
        in: query
        name: serviceZoneId
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.TimeseriesResponse'
        "400":
          description: Bad Request (dates, service zone, or conflicting filters)
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden (scope, plan, or zone access)
          schema:
            type: string
        "404":
          description: Unit not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Statistics timeseries (daily or hourly for a single day)
      tags:
      - statistics
