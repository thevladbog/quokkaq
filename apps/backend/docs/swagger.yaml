host: localhost:3001
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is the backend API for QuokkaQ, rewritten in Go. Published docs
    are OpenAPI 3 (see /docs/openapi.json); annotations target Swagger 2 for swag,
    then converted.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: QuokkaQ Go Backend API
  version: "1.0"
paths:
  /auth/accessible-companies:
    get:
      description: Distinct tenants from unit assignments and company ownership. Optional
        query q searches name, legal name, INN, counterparty JSON.
      operationId: authAccessibleCompanies
      parameters:
      - description: Search substring (case-insensitive)
        in: query
        name: q
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AccessibleCompaniesResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List companies the current user may access
      tags:
      - auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset link to the user's email
      parameters:
      - description: Email Address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset link sent
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Request Password Reset
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user; refresh JWT is set only via HttpOnly `Set-Cookie`
        (SessionCookie). JSON returns access JWT (`token` duplicates `accessToken`
        for legacy clients). Optional `tenantSlug` scopes login to a tenant the user
        can access; omit for default behavior.
      operationId: authLogin
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginSessionResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: User Login
      tags:
      - auth
  /auth/login-context:
    get:
      operationId: authLoginContext
      parameters:
      - description: Opaque token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.PublicTenantResponse'
      summary: Resolve tenant context by opaque login token
      tags:
      - auth
  /auth/login/tenant-hint:
    post:
      consumes:
      - application/json
      operationId: authTenantHint
      parameters:
      - description: Email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.tenantHintRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.TenantHintResponse'
      summary: Resolve next login step from email (tenant hint)
      tags:
      - auth
  /auth/logout:
    post:
      description: Clears HttpOnly session cookies set by login and refresh. Does
        not require a JSON body.
      operationId: authLogout
      responses:
        "204":
          description: No Content
      summary: Log out (clear session cookies)
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the currently authenticated user's information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: User not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/refresh:
    post:
      description: 'Exchanges a valid refresh JWT for a new access JWT. The refresh
        token is read from HttpOnly session cookies when present; otherwise send `Authorization:
        Bearer <refresh>`. Rotated refresh tokens are returned only via `Set-Cookie`,
        not in the JSON body.'
      operationId: authRefresh
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.RefreshResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Refresh tokens
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets the user's password using a valid token
      parameters:
      - description: New Password and Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset successfully
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Invalid or expired token
          schema:
            type: string
      summary: Reset Password
      tags:
      - auth
  /auth/saml/acs:
    post:
      consumes:
      - application/x-www-form-urlencoded
      operationId: authSAMLACS
      parameters:
      - description: SAML Response (Base64)
        in: formData
        name: SAMLResponse
        required: true
        type: string
      - description: Relay state from SP-initiated login
        in: formData
        name: RelayState
        type: string
      responses:
        "302":
          description: Redirect to app with one-time code
        "400":
          description: Bad request
          schema:
            type: string
      summary: SAML Assertion Consumer Service (POST from IdP)
      tags:
      - auth
  /auth/saml/metadata:
    get:
      operationId: authSAMLMetadata
      parameters:
      - description: Tenant slug
        in: query
        name: tenant
        required: true
        type: string
      produces:
      - application/xml
      responses:
        "200":
          description: SP metadata XML
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
      summary: SAML SP metadata XML (register at IdP)
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Register a new user and organization with trial subscription
      operationId: authSignup
      parameters:
      - description: Signup Information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.LoginSessionResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "409":
          description: Email already exists
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Sign Up
      tags:
      - auth
  /auth/sso/authorize:
    get:
      operationId: authSSOAuthorize
      parameters:
      - description: Tenant slug
        in: query
        name: tenant
        required: true
        type: string
      - description: UI locale for post-SSO redirects (en|ru)
        in: query
        name: locale
        type: string
      responses:
        "302":
          description: Redirect
      summary: Start SSO (OIDC or SAML — redirect to IdP)
      tags:
      - auth
  /auth/sso/callback:
    get:
      operationId: authSSOCallback
      parameters:
      - description: Authorization code from IdP
        in: query
        name: code
        required: true
        type: string
      - description: OAuth state
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Redirect to app
      summary: OIDC callback
      tags:
      - auth
  /auth/sso/exchange:
    post:
      consumes:
      - application/json
      operationId: authSSOExchange
      parameters:
      - description: One-time code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.ssoExchangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginSessionResponse'
      summary: Exchange one-time SSO code for JWT pair
      tags:
      - auth
  /bookings:
    post:
      consumes:
      - application/json
      description: Creates a new booking for a service in a unit
      parameters:
      - description: Booking Data
        in: body
        name: booking
        required: true
        schema:
          $ref: '#/definitions/models.Booking'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Booking'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Create a new booking
      tags:
      - bookings
  /bookings/{id}:
    delete:
      description: Deletes a booking by its ID
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete a booking
      tags:
      - bookings
    get:
      description: Retrieves a specific booking by its ID
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Booking'
        "404":
          description: Booking not found
          schema:
            type: string
      summary: Get a booking by ID
      tags:
      - bookings
    put:
      consumes:
      - application/json
      description: Updates an existing booking
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      - description: Booking Data
        in: body
        name: booking
        required: true
        schema:
          $ref: '#/definitions/models.Booking'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Booking'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update a booking
      tags:
      - bookings
  /calendar-integrations/google/oauth/callback:
    get:
      operationId: calendarIntegrationGoogleOAuthCallback
      parameters:
      - description: Authorization code from Google
        in: query
        name: code
        required: true
        type: string
      - description: OAuth state (PKCE session key)
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: 'Found — redirect only (no JSON body). Success: Location to
            return path with google_calendar_pick. Failures: Location to return path
            with google_calendar=error and reason (or equivalent query parameters).'
          headers:
            Location:
              description: Where the browser should navigate next (success or error
                redirect target).
              type: string
      summary: Google Calendar OAuth callback (browser redirect)
      tags:
      - calendar-integration
  /companies/{companyId}/usage-metrics:
    get:
      description: Returns current resource usage and limits for the company
      parameters:
      - description: Company ID
        in: path
        name: companyId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UsageMetricsResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get Usage Metrics
      tags:
      - usage
  /companies/dadata/address/clean:
    post:
      consumes:
      - application/json
      description: Authenticated proxy to DaData Cleaner; request body is forwarded
        unchanged (see DaData Cleaner API). Requires cleaner API key on the server.
      parameters:
      - description: DaData cleaner request JSON
        in: body
        name: body
        required: true
        schema:
          items: {}
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: Raw DaData JSON (HTTP status may mirror upstream)
          schema:
            $ref: '#/definitions/handlers.DaDataUpstreamResponse'
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "413":
          description: request body too large
          schema:
            type: string
        "502":
          description: Upstream error
          schema:
            type: string
        "503":
          description: DaData Cleaner is not configured
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 'DaData Cleaner: standardize address strings'
      tags:
      - dadata
  /companies/dadata/address/suggest:
    post:
      consumes:
      - application/json
      description: Authenticated proxy to DaData address suggestions; request body
        is forwarded unchanged (see DaData Suggestions API).
      parameters:
      - description: DaData address suggest JSON
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.DaDataPassthroughRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Raw DaData JSON (HTTP status may mirror upstream)
          schema:
            $ref: '#/definitions/handlers.DaDataUpstreamResponse'
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "413":
          description: request body too large
          schema:
            type: string
        "502":
          description: Upstream error
          schema:
            type: string
        "503":
          description: DaData is not configured
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 'DaData: address suggestions (passthrough body)'
      tags:
      - dadata
  /companies/dadata/bank/suggest:
    post:
      consumes:
      - application/json
      description: Authenticated proxy to DaData bank suggestions; request body is
        forwarded unchanged (see DaData Suggestions API).
      parameters:
      - description: DaData bank suggest JSON
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.DaDataPassthroughRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Raw DaData JSON (HTTP status may mirror upstream)
          schema:
            $ref: '#/definitions/handlers.DaDataUpstreamResponse'
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "413":
          description: request body too large
          schema:
            type: string
        "502":
          description: Upstream error
          schema:
            type: string
        "503":
          description: DaData is not configured
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 'DaData: bank suggestions by BIC/name (passthrough body)'
      tags:
      - dadata
  /companies/dadata/party/find-by-inn:
    post:
      consumes:
      - application/json
      description: Authenticated proxy to DaData findById/party. Requires JSON field
        inn; optional kpp and type are forwarded to DaData when set.
      parameters:
      - description: INN and optional KPP/type
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.DaDataFindPartyByInnRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Raw DaData JSON (HTTP status may mirror upstream)
          schema:
            $ref: '#/definitions/handlers.DaDataUpstreamResponse'
        "400":
          description: Bad request or inn is required
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "413":
          description: request body too large
          schema:
            type: string
        "500":
          description: Internal error
          schema:
            type: string
        "502":
          description: Upstream error
          schema:
            type: string
        "503":
          description: DaData is not configured
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 'DaData: organization by INN (findById/party)'
      tags:
      - dadata
  /companies/dadata/party/suggest:
    post:
      consumes:
      - application/json
      description: Authenticated proxy to DaData party suggestions; request body is
        forwarded unchanged (see DaData Suggestions API).
      parameters:
      - description: DaData party suggest JSON
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.DaDataPassthroughRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Raw DaData JSON (HTTP status may mirror upstream)
          schema:
            $ref: '#/definitions/handlers.DaDataUpstreamResponse'
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "413":
          description: request body too large
          schema:
            type: string
        "502":
          description: Upstream error
          schema:
            type: string
        "503":
          description: DaData is not configured
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 'DaData: party suggestions (passthrough body)'
      tags:
      - dadata
  /companies/me:
    get:
      parameters:
      - description: Tenant company UUID when the user belongs to multiple organizations
        in: header
        name: X-Company-Id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.companyMeResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: 'Forbidden: no access to selected organization'
          schema:
            type: string
        "404":
          description: No company found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get current user's company (tenant admin)
      tags:
      - companies
    patch:
      consumes:
      - application/json
      description: 'Partial update: JSON body matches models.CompanyPatch at the root
        (not wrapped in a "company" property). Only send fields to change. Cannot
        combine clearBillingAddress with billingAddress (same for counterparty).'
      parameters:
      - description: Patch payload
        in: body
        name: company
        required: true
        schema:
          $ref: '#/definitions/models.CompanyPatch'
      - description: Tenant company UUID when the user belongs to multiple organizations
        in: header
        name: X-Company-Id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Company'
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: 'Forbidden: no access to selected organization'
          schema:
            type: string
        "404":
          description: No company found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update current user's company (tenant admin)
      tags:
      - companies
  /companies/me/calendar-integrations:
    get:
      operationId: calendarIntegrationListMine
      parameters:
      - description: Optional company selector for admins with multiple companies
        in: header
        name: X-Company-Id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/services.CalendarIntegrationPublic'
            type: array
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "409":
          description: Conflict
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List calendar integrations for current company
      tags:
      - calendar-integration
    post:
      consumes:
      - application/json
      operationId: calendarIntegrationCreateMine
