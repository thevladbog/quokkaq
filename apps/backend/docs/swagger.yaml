      description: Paginated platform catalog nomenclature for invoice line presets.
        Each item may include an embedded subscription plan. Default page size 50;
        maximum 200 (enforced server-side).
      parameters:
      - default: 50
        description: Page size (max 200)
        in: query
        name: limit
        type: integer
      - default: 0
        description: Zero-based row offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.platformListResponse-models_CatalogItem'
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List catalog items (platform)
      tags:
      - platform
    post:
      consumes:
      - application/json
      description: Creates a catalog row. Field name is required. Empty printName
        defaults to name; empty unit defaults to шт; empty currency defaults to RUB.
        Optional subscriptionPlanId must reference an existing plan or the request
        fails with 400.
      parameters:
      - description: New catalog item
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CatalogItemCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.CatalogItem'
        "400":
          description: Bad request (invalid JSON, missing name, or unknown subscriptionPlanId)
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create catalog item (platform)
      tags:
      - platform
  /platform/catalog-items/{id}:
    delete:
      description: Deletes a catalog item by ID after an existence check. If no row
        matches, responds with 404 (no silent success).
      parameters:
      - description: Catalog item ID (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete catalog item (platform)
      tags:
      - platform
    get:
      description: Returns one catalog item by ID, including linked subscription plan
        when subscriptionPlanId is set.
      parameters:
      - description: Catalog item ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CatalogItem'
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get catalog item by ID (platform)
      tags:
      - platform
    patch:
      consumes:
      - application/json
      description: 'Partial update: only fields present in the JSON body are changed.
        Omit keys to leave values unchanged. Whitespace-only subscriptionPlanId clears
        the link; a non-empty value must reference an existing plan.'
      parameters:
      - description: Catalog item ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CatalogItemPatchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CatalogItem'
        "400":
          description: Bad request (invalid JSON or unknown subscriptionPlanId)
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Patch catalog item (platform)
      tags:
      - platform
