basePath: /
definitions:
  handlers.AssignUnitRequest:
    properties:
      permissions:
        items:
          type: string
        type: array
      unitId:
        type: string
    type: object
  handlers.CallNextRequest:
    properties:
      counterId:
        type: string
      serviceId:
        type: string
    type: object
  handlers.CreateCheckoutRequest:
    properties:
      planCode:
        type: string
    type: object
  handlers.CreateCheckoutResponse:
    properties:
      checkoutUrl:
        type: string
      sessionId:
        type: string
    type: object
  handlers.CreateInvitationRequest:
    properties:
      email:
        type: string
      targetRoles:
        type: object
      targetUnits:
        type: object
      templateId:
        type: string
    type: object
  handlers.CreateTicketRequest:
    properties:
      serviceId:
        type: string
      unitId:
        type: string
    type: object
  handlers.ForgotPasswordRequest:
    properties:
      email:
        type: string
    type: object
  handlers.InvoicePDFNotImplementedResponse:
    properties:
      error:
        type: string
    type: object
  handlers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handlers.LoginResponse:
    properties:
      token:
        type: string
    type: object
  handlers.PickRequest:
    properties:
      counterId:
        type: string
    type: object
  handlers.RegisterUserRequest:
    properties:
      name:
        type: string
      password:
        type: string
      token:
        type: string
    type: object
  handlers.RemoveUnitRequest:
    properties:
      unitId:
        type: string
    type: object
  handlers.ResetPasswordRequest:
    properties:
      newPassword:
        type: string
      token:
        type: string
    type: object
  handlers.SignupRequest:
    properties:
      companyName:
        type: string
      email:
        type: string
      name:
        type: string
      password:
        type: string
      planCode:
        description: optional, defaults to starter with trial
        type: string
    type: object
  handlers.TransferRequest:
    properties:
      toCounterId:
        type: string
      toUserId:
        type: string
    type: object
  handlers.UpdateStatusRequest:
    properties:
      status:
        type: string
    type: object
  handlers.setupFirstAdminRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  models.Booking:
    properties:
      code:
        type: string
      createdAt:
        type: string
      id:
        type: string
      scheduledAt:
        type: string
      serviceId:
        type: string
      status:
        type: string
      unitId:
        type: string
      userName:
        type: string
      userPhone:
        type: string
    type: object
  models.Counter:
    properties:
      assignedTo:
        type: string
      assignedUser:
        $ref: '#/definitions/models.User'
      id:
        type: string
      name:
        type: string
      unitId:
        type: string
    type: object
  models.DayScheduleWithBookings:
    properties:
      createdAt:
        type: string
      date:
        description: YYYY-MM-DD
        type: string
      id:
        type: string
      isDayOff:
        type: boolean
      serviceSlots:
        items:
          $ref: '#/definitions/models.ServiceSlot'
        type: array
      slots:
        items:
          $ref: '#/definitions/models.ServiceSlotWithBooking'
        type: array
      unitId:
        type: string
      updatedAt:
        type: string
    type: object
  models.GenerateSlotsRequest:
    properties:
      from:
        description: inclusive start date (YYYY-MM-DD)
        type: string
      to:
        description: inclusive end date (YYYY-MM-DD)
        type: string
    type: object
  models.Invitation:
    properties:
      createdAt:
        type: string
      email:
        type: string
      expiresAt:
        type: string
      id:
        type: string
      status:
        type: string
      targetRoles:
        type: object
      targetUnits:
        description: Stored permissions to be assigned upon acceptance (JSONB; OpenAPI
          as generic object)
        type: object
      token:
        type: string
      updatedAt:
        type: string
      userId:
        type: string
    type: object
  models.Invoice:
    properties:
      amount:
        description: amount in minor units
        type: integer
      companyId:
        type: string
      createdAt:
        type: string
      currency:
        description: '"RUB", "USD"'
        type: string
      dueDate:
        description: payment due date
        type: string
      id:
        type: string
      paidAt:
        description: when payment was received
        type: string
      paymentProvider:
        description: '"stripe", "yookassa", "manual"'
        type: string
      paymentProviderInvoiceId:
        description: external invoice ID
        type: string
      status:
        description: '"draft", "open", "paid", "void", "uncollectible"'
        type: string
      subscription:
        $ref: '#/definitions/models.Subscription'
      subscriptionId:
        type: string
      updatedAt:
        type: string
    type: object
  models.MessageTemplate:
    properties:
      content:
        type: string
      createdAt:
        type: string
      id:
        type: string
      isDefault:
        type: boolean
      name:
        type: string
      subject:
        type: string
      updatedAt:
        type: string
    type: object
  models.PreRegistration:
    properties:
      code:
        description: 6-digit unique code
        type: string
      comment:
        type: string
      createdAt:
        type: string
      customerName:
        type: string
      customerPhone:
        type: string
      date:
        description: YYYY-MM-DD
        type: string
      id:
        type: string
      service:
        $ref: '#/definitions/models.Service'
      serviceId:
        type: string
      status:
        description: created, canceled, ticket_issued, completed
        type: string
      ticket:
        $ref: '#/definitions/models.Ticket'
      ticketId:
        type: string
      time:
        description: HH:MM
        type: string
      unitId:
        type: string
      updatedAt:
        type: string
    type: object
  models.PreRegistrationCodeRequest:
    properties:
      code:
        type: string
    type: object
  models.PreRegistrationCreateRequest:
    properties:
      comment:
        type: string
      customerName:
        type: string
      customerPhone:
        type: string
      date:
        type: string
      serviceId:
        type: string
      time:
        type: string
    type: object
  models.PreRegistrationRedeemResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
      ticket:
        $ref: '#/definitions/models.Ticket'
    type: object
  models.PreRegistrationUpdateRequest:
    properties:
      comment:
        type: string
      customerName:
        type: string
      customerPhone:
        type: string
      date:
        type: string
      serviceId:
        type: string
      time:
        type: string
    type: object
  models.Role:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  models.Service:
    properties:
      backgroundColor:
        type: string
      children:
        items:
          $ref: '#/definitions/models.Service'
        type: array
      description:
        type: string
      descriptionEn:
        type: string
      descriptionRu:
        type: string
      duration:
        description: In seconds
        type: integer
      gridCol:
        type: integer
      gridColSpan:
        type: integer
      gridRow:
        description: Grid configuration
        type: integer
      gridRowSpan:
        type: integer
      id:
        type: string
      imageUrl:
        type: string
      isLeaf:
        type: boolean
      maxWaitingTime:
        description: In seconds
        type: integer
      name:
        type: string
      nameEn:
        type: string
      nameRu:
        type: string
      numberSequence:
        type: string
      parentId:
        type: string
      prebook:
        type: boolean
      prefix:
        type: string
      textColor:
        type: string
      unitId:
        type: string
    type: object
  models.ServiceSlot:
    properties:
      capacity:
        type: integer
      createdAt:
        type: string
      dayScheduleId:
        type: string
      id:
        type: string
      serviceId:
        type: string
      startTime:
        description: HH:MM
        type: string
      updatedAt:
        type: string
    type: object
  models.ServiceSlotWithBooking:
    properties:
      booked:
        type: integer
      capacity:
        type: integer
      createdAt:
        type: string
      dayScheduleId:
        type: string
      id:
        type: string
      serviceId:
        type: string
      startTime:
        description: HH:MM
        type: string
      updatedAt:
        type: string
    type: object
  models.SlotConfig:
    properties:
      createdAt:
        type: string
      days:
        description: '["monday", "tuesday", ...]'
        items:
          type: string
        type: array
      endTime:
        description: HH:MM
        type: string
      id:
        type: string
      interval:
        description: in minutes
        type: integer
      startTime:
        description: HH:MM
        type: string
      unitId:
        type: string
      updatedAt:
        type: string
    type: object
  models.SlotSuccessResponse:
    properties:
      success:
        type: boolean
    type: object
  models.Subscription:
    properties:
      cancelAtPeriodEnd:
        type: boolean
      companyId:
        type: string
      createdAt:
        type: string
      currentPeriodEnd:
        type: string
      currentPeriodStart:
        type: string
      id:
        type: string
      metadata:
        description: additional data
        type: object
      plan:
        allOf:
        - $ref: '#/definitions/models.SubscriptionPlan'
        description: Relations
      planId:
        type: string
      status:
        description: '"trial", "active", "past_due", "canceled", "paused"'
        type: string
      stripeSubscriptionId:
        description: Stripe sub_… after Checkout completes
        type: string
      trialEnd:
        type: string
      updatedAt:
        type: string
    type: object
  models.SubscriptionPlan:
    properties:
      code:
        description: unique plan code like "starter", "professional"
        type: string
      createdAt:
        type: string
      currency:
        description: '"RUB", "USD"'
        type: string
      features:
        description: feature flags
        type: object
      id:
        type: string
      interval:
        description: '"month", "year"'
        type: string
      isActive:
        type: boolean
      limits:
        description: quota limits
        type: object
      name:
        description: '"Starter", "Professional", "Enterprise"'
        type: string
      price:
        description: price in minor units (cents/kopeks)
        type: integer
      updatedAt:
        type: string
    type: object
  models.Ticket:
    properties:
      booking:
        $ref: '#/definitions/models.Booking'
      bookingId:
        type: string
      calledAt:
        type: string
      completedAt:
        type: string
      confirmedAt:
        type: string
      counter:
        $ref: '#/definitions/models.Counter'
      counterId:
        type: string
      createdAt:
        type: string
      id:
        type: string
      isEod:
        type: boolean
      lastCalledAt:
        type: string
      maxWaitingTime:
        description: Snapshot from Service at creation
        type: integer
      preRegistration:
        allOf:
        - $ref: '#/definitions/models.PreRegistration'
        description: 'No DB FK: avoids AutoMigrate cycle with pre_registrations.ticket_id
          → tickets.id'
      preRegistrationId:
        type: string
      priority:
        type: integer
      queueNumber:
        type: string
      service:
        $ref: '#/definitions/models.Service'
      serviceId:
        type: string
      status:
        type: string
      ttsUrl:
        description: URL to the generated TTS audio file
        type: string
      unitId:
        type: string
    type: object
  models.Unit:
    properties:
      code:
        type: string
      companyId:
        type: string
      config:
        type: object
      counters:
        items:
          $ref: '#/definitions/models.Counter'
        type: array
      createdAt:
        type: string
      id:
        type: string
      name:
        type: string
      preRegistrations:
        items:
          $ref: '#/definitions/models.PreRegistration'
        type: array
      services:
        items:
          $ref: '#/definitions/models.Service'
        type: array
      slotConfig:
        $ref: '#/definitions/models.SlotConfig'
      tickets:
        items:
          $ref: '#/definitions/models.Ticket'
        type: array
      timezone:
        type: string
      updatedAt:
        type: string
    type: object
  models.UnitMaterial:
    properties:
      createdAt:
        type: string
      filename:
        type: string
      id:
        type: string
      type:
        type: string
      unitId:
        type: string
      url:
        type: string
    type: object
  models.UpdateDayScheduleRequest:
    properties:
      isDayOff:
        type: boolean
      slots:
        items:
          $ref: '#/definitions/models.ServiceSlot'
        type: array
    type: object
  models.User:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      phone:
        type: string
      roles:
        description: Relations
        items:
          $ref: '#/definitions/models.UserRole'
        type: array
      type:
        type: string
      units:
        items:
          $ref: '#/definitions/models.UserUnit'
        type: array
    type: object
  models.UserRole:
    properties:
      id:
        type: string
      role:
        $ref: '#/definitions/models.Role'
      roleId:
        type: string
      userId:
        type: string
    type: object
  models.UserUnit:
    properties:
      id:
        type: string
      permissions:
        items:
          type: string
        type: array
      unit:
        $ref: '#/definitions/models.Unit'
      unitId:
        type: string
      userId:
        type: string
    type: object
  models.WeeklySlotCapacity:
    properties:
      capacity:
        type: integer
      createdAt:
        type: string
      dayOfWeek:
        description: monday, tuesday, ...
        type: string
      id:
        type: string
      serviceId:
        type: string
      startTime:
        description: HH:MM
        type: string
      unitId:
        type: string
      updatedAt:
        type: string
    type: object
  services.Period:
    properties:
      end:
        type: string
      start:
        type: string
    type: object
  services.UsageMetricInfo:
    properties:
      current:
        type: integer
      limit:
        type: integer
    type: object
  services.UsageMetrics:
    properties:
      currentPeriod:
        $ref: '#/definitions/services.Period'
      metrics:
        additionalProperties:
          $ref: '#/definitions/services.UsageMetricInfo'
        type: object
    type: object
host: localhost:3001
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is the backend API for QuokkaQ, rewritten in Go.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: QuokkaQ Go Backend API
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset link to the user's email
      parameters:
      - description: Email Address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset link sent
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Request Password Reset
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT token
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: User Login
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the currently authenticated user's information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: User not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets the user's password using a valid token
      parameters:
      - description: New Password and Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset successfully
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Invalid or expired token
          schema:
            type: string
      summary: Reset Password
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Register a new user and organization with trial subscription
      parameters:
      - description: Signup Information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.SignupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "409":
          description: Email already exists
          schema:
            type: string
      summary: Sign Up
      tags:
      - auth
  /bookings:
    post:
      consumes:
      - application/json
      description: Creates a new booking for a service in a unit
      parameters:
      - description: Booking Data
        in: body
        name: booking
        required: true
        schema:
          $ref: '#/definitions/models.Booking'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Booking'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Create a new booking
      tags:
      - bookings
  /bookings/{id}:
    delete:
      description: Deletes a booking by its ID
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete a booking
      tags:
      - bookings
    get:
      description: Retrieves a specific booking by its ID
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Booking'
        "404":
          description: Booking not found
          schema:
            type: string
      summary: Get a booking by ID
      tags:
      - bookings
    put:
      consumes:
      - application/json
      description: Updates an existing booking
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      - description: Booking Data
        in: body
        name: booking
        required: true
        schema:
          $ref: '#/definitions/models.Booking'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Booking'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update a booking
      tags:
      - bookings
  /companies/{companyId}/usage-metrics:
    get:
      description: Returns current resource usage and limits for the company
      parameters:
      - description: Company ID
        in: path
        name: companyId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.UsageMetrics'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get Usage Metrics
      tags:
      - usage
  /companies/me/complete-onboarding:
    post:
      consumes:
      - application/json
      description: Marks onboarding as complete for the user's company
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: No company found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Complete Onboarding
      tags:
      - companies
  /counters:
    post:
      consumes:
      - application/json
      description: Creates a new counter for a unit
      parameters:
      - description: Counter Data
        in: body
        name: counter
        required: true
        schema:
          $ref: '#/definitions/models.Counter'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Counter'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Create a new counter
      tags:
      - counters
  /counters/{id}:
    delete:
      description: Deletes a counter by its ID
      parameters:
      - description: Counter ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete a counter
      tags:
      - counters
    get:
      description: Retrieves a specific counter by its ID
      parameters:
      - description: Counter ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Counter'
        "404":
          description: Counter not found
          schema:
            type: string
      summary: Get a counter by ID
      tags:
      - counters
    put:
      consumes:
      - application/json
      description: Updates an existing counter
      parameters:
      - description: Counter ID
        in: path
        name: id
        required: true
        type: string
      - description: Counter Data
        in: body
        name: counter
        required: true
        schema:
          $ref: '#/definitions/models.Counter'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Counter'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update a counter
      tags:
      - counters
  /counters/{id}/call-next:
    post:
      consumes:
      - application/json
      description: Calls the next waiting ticket for the counter
      parameters:
      - description: Counter ID
        in: path
        name: id
