  /webhooks/yookassa:
    post:
      description: Receives YooKassa HTTP notifications. Verifies HMAC-SHA256 using X-YooMoney-Signature, then processes payment.succeeded when metadata contains invoice_id (platform invoice paid flow).
      parameters:
      - description: Must be application/json
        in: header
        name: Content-Type
        required: true
        schema:
          type: string
      - description: Webhook HMAC-SHA256 digest (hex, optional sha256= prefix)
        in: header
        name: X-YooMoney-Signature
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/handlers.YooKassaWebhookNotification'
        description: YooKassa notification JSON (event + object)
        required: true
        x-originalParamName: body
      responses:
        '200':
          description: Empty response body
        '400':
          content:
            application/json:
              schema:
                type: string
          description: Bad request
        '401':
          content:
            application/json:
              schema:
                type: string
          description: Invalid or missing signature
        '405':
          content:
            application/json:
              schema:
                type: string
          description: Method not allowed
        '413':
          content:
            application/json:
              schema:
                type: string
          description: Request body too large
        '500':
          content:
            application/json:
              schema:
                type: string
          description: Internal server error
        '503':
          content:
            application/json:
              schema:
                type: string
          description: Service unavailable (webhook signing secret not configured)
      summary: YooKassa payment webhook
      tags:
      - webhooks
servers:
- url: https://localhost:3001/
