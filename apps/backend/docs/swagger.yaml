        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "413":
          description: request body too large
          schema:
            type: string
        "502":
          description: Upstream error
          schema:
            type: string
        "503":
          description: DaData Cleaner is not configured
          schema:
            type: string
