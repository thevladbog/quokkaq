      - description: Unit ID
        in: path
        name: unitId
        required: true
        type: string
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Opaque keyset pagination cursor
        in: query
        name: cursor
        type: string
      - description: Filter by ticket.counter_id
        in: query
        name: counterId
        type: string
      - description: Filter by history actor user id
        in: query
        name: userId
        type: string
      - description: Filter by ticket.client_id
        in: query
        name: clientId
        type: string
      - description: Ticket UUID or queue number substring
        in: query
        name: ticket
        type: string
      - description: Search queue number, ticket id, or visitor name
        in: query
        name: q
        type: string
      - description: Comma-separated DOW 0-6 (unit timezone)
        in: query
        name: weekdays
        type: string
      - description: Inclusive start date YYYY-MM-DD (unit timezone)
        in: query
        name: dateFrom
        type: string
      - description: Inclusive end date YYYY-MM-DD (unit timezone)
        in: query
        name: dateTo
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.ShiftActivityResponse'
        "400":
          description: Bad Request
