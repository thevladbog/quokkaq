          type: boolean
        allowYookassaPaymentLink:
          type: boolean
        companyId:
          type: string
        currency:
          type: string
        dueDate:
          description: RFC3339
          type: string
        lines:
          items:
            $ref: '#/components/schemas/handlers.InvoiceDraftLineInput'
          minItems: 1
          type: array
        provisionSubscriptionsOnPayment:
          type: boolean
      required:
      - companyId
      - dueDate
      - lines
      type: object
