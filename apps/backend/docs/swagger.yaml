  /units/{unitId}/shift/activity:
    get:
      description: 'Paginated ticket history rows for tickets belonging to the unit
        (supervisor dashboard / journal). Limit is capped at 100. Optional filters:
        counterId (current ticket counter_id), userId (history actor), clientId, ticket
        (UUID or queue substring), q (search queue/id/visitor name), weekdays (comma-separated
        PostgreSQL DOW 0=Sun..6=Sat in unit timezone), dateFrom/dateTo (YYYY-MM-DD
        inclusive, history timestamp calendar date in unit timezone). counter_id reflects
        the ticket''s current assignment, not necessarily the desk at event time.
        For users without full journal access (not admin/supervisor/platform_admin
        and no ACCESS_SUPERVISOR_PANEL on this unit), results are restricted to rows
        where the authenticated user is the history actor; userId filter is ignored/overridden
        in that case.'
