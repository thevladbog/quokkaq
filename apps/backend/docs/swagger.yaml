info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is the backend API for QuokkaQ, rewritten in Go. Published docs are OpenAPI 3 (see /docs/openapi.json); annotations target Swagger 2 for swag, then converted.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: QuokkaQ Go Backend API
  version: '1.0'
openapi: 3.0.3
paths:
  /auth/forgot-password:
    post:
      description: Sends a password reset link to the user's email
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/handlers.ForgotPasswordRequest'
        description: Email Address
        required: true
        x-originalParamName: request
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
          description: Reset link sent
        '400':
          content:
            application/json:
              schema:
                type: string
          description: Bad Request
      summary: Request Password Reset
      tags:
      - auth
  /auth/login:
    post:
      description: Authenticates a user and returns a JWT token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/handlers.LoginRequest'
        description: Login Credentials
        required: true
        x-originalParamName: request
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.LoginResponse'
          description: OK
        '400':
          content:
            application/json:
              schema:
                type: string
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                type: string
          description: Unauthorized
      summary: User Login
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the currently authenticated user's information
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.User'
          description: OK
        '401':
          content:
            application/json:
              schema:
                type: string
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                type: string
          description: User not found
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/reset-password:
    post:
      description: Resets the user's password using a valid token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/handlers.ResetPasswordRequest'
        description: New Password and Token
        required: true
        x-originalParamName: request
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
          description: Password reset successfully
        '400':
          content:
            application/json:
              schema:
                type: string
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                type: string
          description: Invalid or expired token
      summary: Reset Password
      tags:
      - auth
  /auth/signup:
    post:
      description: Register a new user and organization with trial subscription
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/handlers.SignupRequest'
        description: Signup Information
        required: true
        x-originalParamName: request
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.LoginResponse'
          description: Created
        '400':
          content:
            application/json:
              schema:
                type: string
          description: Bad Request
        '409':
          content:
            application/json:
              schema:
                type: string
          description: Email already exists
        '500':
          content:
            application/json:
              schema:
                type: string
          description: Internal Server Error
      summary: Sign Up
      tags:
      - auth
  /bookings:
    post:
      description: Creates a new booking for a service in a unit
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/models.Booking'
        description: Booking Data
        required: true
        x-originalParamName: booking
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.Booking'
          description: Created
        '400':
          content:
            application/json:
              schema:
                type: string
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                type: string
          description: Internal Server Error
      summary: Create a new booking
      tags:
      - bookings
  /bookings/{id}:
    delete:
      description: Deletes a booking by its ID
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '204':
          description: No Content
        '500':
          content:
            application/json:
              schema:
                type: string
          description: Internal Server Error
      summary: Delete a booking
      tags:
      - bookings
    get:
      description: Retrieves a specific booking by its ID
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.Booking'
          description: OK
        '404':
          content:
            application/json:
              schema:
                type: string
          description: Booking not found
      summary: Get a booking by ID
      tags:
      - bookings
    put:
      description: Updates an existing booking
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/models.Booking'
        description: Booking Data
        required: true
        x-originalParamName: booking
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.Booking'
          description: OK
        '400':
          content:
            application/json:
              schema:
                type: string
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                type: string
          description: Internal Server Error
      summary: Update a booking
      tags:
      - bookings
  /companies/{companyId}/usage-metrics:
    get:
      description: Returns current resource usage and limits for the company
      parameters:
      - description: Company ID
        in: path
        name: companyId
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.UsageMetricsResponse'
          description: OK
        '400':
          content:
            application/json:
              schema:
                type: string
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                type: string
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                type: string
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                type: string
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get Usage Metrics
      tags:
      - usage
  /companies/dadata/address/clean:
    post:
      description: Authenticated proxy to DaData Cleaner; request body is forwarded unchanged (see DaData Cleaner API). Requires cleaner API key on the server.
      requestBody:
        content:
          application/json:
            schema:
              items: {}
              type: array
        description: DaData cleaner request JSON
        required: true
        x-originalParamName: body
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.DaDataUpstreamResponse'
          description: Raw DaData JSON (HTTP status may mirror upstream)
        '400':
          content:
            application/json:
              schema:
                type: string
          description: Bad request
        '401':
          content:
            application/json:
              schema:
                type: string
          description: Unauthorized
        '413':
          content:
            application/json:
              schema:
                type: string
          description: request body too large
        '502':
          content:
            application/json:
              schema:
                type: string
          description: Upstream error
        '503':
          content:
            application/json:
              schema:
                type: string
          description: DaData Cleaner is not configured
      security:
      - BearerAuth: []
      summary: 'DaData Cleaner: standardize address strings'
      tags:
      - dadata
  /companies/dadata/address/suggest:
    post:
      description: Authenticated proxy to DaData address suggestions; request body is forwarded unchanged (see DaData Suggestions API).
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/handlers.DaDataPassthroughRequest'
        description: DaData address suggest JSON
        required: true
        x-originalParamName: body
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.DaDataUpstreamResponse'
          description: Raw DaData JSON (HTTP status may mirror upstream)
        '400':
          content:
            application/json:
              schema:
                type: string
          description: Bad request
        '401':
          content:
            application/json:
              schema:
                type: string
          description: Unauthorized
        '413':
          content:
            application/json:
              schema:
                type: string
          description: request body too large
        '502':
          content:
            application/json:
              schema:
                type: string
          description: Upstream error
        '503':
          content:
            application/json:
              schema:
                type: string
          description: DaData is not configured
      security:
      - BearerAuth: []
      summary: 'DaData: address suggestions (passthrough body)'
      tags:
      - dadata
  /companies/dadata/bank/suggest:
