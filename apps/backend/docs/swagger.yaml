  /webhooks/yookassa:
    post:
      consumes:
      - application/json
      description: Receives YooKassa HTTP notifications. Verifies HMAC-SHA256 using
        X-YooMoney-Signature, then processes payment.succeeded when metadata contains
        invoice_id (platform invoice paid flow).
      parameters:
      - description: Must be application/json
        in: header
        name: Content-Type
        required: true
        type: string
      - description: Webhook HMAC-SHA256 digest (hex, optional sha256= prefix)
        in: header
        name: X-YooMoney-Signature
        required: true
        type: string
      - description: YooKassa notification JSON (event + object)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.YooKassaWebhookNotification'
      produces:
      - application/json
      responses:
        "200":
          description: Empty body on success
          schema:
            type: string
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Invalid or missing signature
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
        "503":
          description: Service unavailable (webhook signing secret not configured)
          schema:
            type: string
      summary: YooKassa payment webhook
      tags:
      - webhooks
