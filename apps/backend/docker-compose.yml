services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: quokkaq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quokkaq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quokkaq-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for background jobs
  redis:
    image: redis:7-alpine
    container_name: quokkaq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quokkaq-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for file storage
  minio:
    image: minio/minio:latest
    container_name: quokkaq-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - quokkaq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create bucket + anonymous read so logo/material URLs work in the browser (path-style GET).
  minio-init:
    image: minio/mc:latest
    container_name: quokkaq-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - quokkaq-network
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        MAX_ATTEMPTS=12
        SLEEP_SEC=2
        attempt=1
        while [ "$$attempt" -le "$$MAX_ATTEMPTS" ]; do
          echo "minio-init: attempt $$attempt/$$MAX_ATTEMPTS..."
          if mc alias set local http://minio:9000 minioadmin minioadmin \
            && mc mb local/quokkaq-materials --ignore-existing \
            && mc anonymous set download local/quokkaq-materials/public; then
            echo 'MinIO: bucket quokkaq-materials ready (anonymous GET under public/)'
            exit 0
          fi
          echo "minio-init: failed, sleeping $$SLEEP_SEC seconds before retry"
          sleep "$$SLEEP_SEC"
          attempt=$$((attempt + 1))
          SLEEP_SEC=$$((SLEEP_SEC * 2))
          if [ "$$SLEEP_SEC" -gt 32 ]; then SLEEP_SEC=32; fi
        done
        echo "minio-init: giving up after $$MAX_ATTEMPTS attempts"
        exit 1
    restart: 'no'

  # QuokkaQ Backend API
  backend:
    build:
      # Monorepo root (Dockerfile expects COPY apps/backend/...)
      context: ../..
      dockerfile: apps/backend/Dockerfile
    container_name: quokkaq-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/quokkaq
      PORT: 3001
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-e2e-dev-jwt-secret-change-in-production}
      # Fail closed: tenant "admin" must not use /platform APIs unless you opt in.
      # Safe default for docker-compose; for local convenience set PLATFORM_ALLOW_TENANT_ADMIN=true in your shell or .env (never in production).
      PLATFORM_ALLOW_TENANT_ADMIN: ${PLATFORM_ALLOW_TENANT_ADMIN:-false}
      
      # MinIO Configuration
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: quokkaq-materials
      AWS_ENDPOINT: http://minio:9000
      # URLs in JSON must be reachable from the host browser (not http://minio:9000).
      AWS_PUBLIC_ENDPOINT: ${AWS_PUBLIC_ENDPOINT:-http://localhost:9000}

      # SMTP (optional; empty defaults avoid Compose "variable is not set" warnings in CI)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      
      # Redis Configuration (jobs worker/client use REDIS_HOST/REDIS_PORT, not REDIS_URL)
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - quokkaq-network
    healthcheck:
      # Use GET (-O /dev/null), not wget --spider: spider sends HEAD and chi only registers GET on / → 405 → unhealthy.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "--tries=1", "http://127.0.0.1:3001/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

networks:
  quokkaq-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
