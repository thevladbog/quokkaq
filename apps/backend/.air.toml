#:schema https://json.schemastore.org/any.json
# Air — hot reload for local API dev (see apps/backend/project.json `serve`).
root = "."
tmp_dir = "tmp"
env_files = [".env"]

[build]
cmd = "go build -o ./tmp/main ./cmd/api"
bin = "tmp/main"
entrypoint = ["./tmp/main"]
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor", "bin", "testdata", "test-results", "docs"]
exclude_regex = ["_test\\.go"]
delay = 500
stop_on_error = true
send_interrupt = true
# Grace period before SIGKILL if the child ignores SIGINT (distinct from Air’s ~5s wait when stopping the runner).
kill_delay = "3s"

[build.windows]
cmd = "go build -o ./tmp/main.exe ./cmd/api"
bin = "tmp/main.exe"
entrypoint = ["tmp/main.exe"]

[misc]
clean_on_exit = true
