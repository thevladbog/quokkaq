# All-in-one QuokkaQ demo stack (single VM). From repo root:
#   cp deploy/demo/.env.demo.example deploy/demo/.env.demo
#   docker compose -f deploy/demo/docker-compose.demo.yml --env-file deploy/demo/.env.demo up -d --build
#
# Optional nightly reset (mounts repo root + docker.sock — isolate on a demo-only VM):
#   docker compose -f deploy/demo/docker-compose.demo.yml --env-file deploy/demo/.env.demo --profile scheduler up -d
#
# Reset manually:
#   bash deploy/demo/demo-reset.sh
#
name: quokkaq-demo

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-quokkaq}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quokkaq-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - quokkaq-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - quokkaq-network
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.demo-minio-api.rule=Host(`${DEMO_S3_HOST}`)
      - traefik.http.routers.demo-minio-api.entrypoints=websecure
      - traefik.http.routers.demo-minio-api.tls.certresolver=letsencrypt
      - traefik.http.routers.demo-minio-api.service=demo-minio-api
      - traefik.http.services.demo-minio-api.loadbalancer.server.port=9000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - quokkaq-network
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-quokkaq-materials}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        MAX_ATTEMPTS=30
        SLEEP_SEC=2
        attempt=1
        while [ "$$attempt" -le "$$MAX_ATTEMPTS" ]; do
          if mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" \
            && mc mb "local/$$AWS_S3_BUCKET" --ignore-existing \
            && mc anonymous set download "local/$$AWS_S3_BUCKET/public"; then
            echo "MinIO: bucket $$AWS_S3_BUCKET ready"
            exit 0
          fi
          echo "minio-init: attempt $$attempt/$$MAX_ATTEMPTS failed, retrying..."
          attempt=$$((attempt + 1))
          sleep "$$SLEEP_SEC"
        done
        exit 1
    restart: on-failure

  backend:
    build:
      context: ../..
      dockerfile: deploy/demo/Dockerfile.demo
    image: ${DEMO_BACKEND_IMAGE:-quokkaq-backend-demo:local}
    restart: unless-stopped
    environment:
      APP_ENV: demo
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-quokkaq}
      DB_SSLMODE: disable
      PORT: '3001'
      APP_BASE_URL: https://${DEMO_API_HOST}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-quokkaq-materials}
      AWS_ENDPOINT: http://minio:9000
      AWS_PUBLIC_ENDPOINT: https://${DEMO_S3_HOST}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DEMO_HISTORY_DAYS: ${DEMO_HISTORY_DAYS:-90}
      DEMO_ADMIN_EMAIL: ${DEMO_ADMIN_EMAIL:-}
      DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:-}
      DEMO_OPERATOR_EMAIL: ${DEMO_OPERATOR_EMAIL:-}
      DEMO_OPERATOR_PASSWORD: ${DEMO_OPERATOR_PASSWORD:-}
      DEMO_UNIT_TIMEZONE: ${DEMO_UNIT_TIMEZONE:-Europe/Moscow}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      CORS_ALLOWED_ORIGINS: https://${DEMO_APP_HOST}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - quokkaq-network
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.demo-api.rule=Host(`${DEMO_API_HOST}`)
      - traefik.http.routers.demo-api.entrypoints=websecure
      - traefik.http.routers.demo-api.tls.certresolver=letsencrypt
      - traefik.http.routers.demo-api.service=demo-api
      - traefik.http.services.demo-api.loadbalancer.server.port=3001
      - traefik.http.middlewares.demo-cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST,DELETE,PATCH
      - traefik.http.middlewares.demo-cors.headers.accesscontrolalloworiginlist=https://${DEMO_APP_HOST}
      - traefik.http.middlewares.demo-cors.headers.accesscontrolmaxage=100
      - traefik.http.middlewares.demo-cors.headers.addvaryheader=true
      - traefik.http.middlewares.demo-cors.headers.accesscontrolallowheaders=*
      - traefik.http.middlewares.demo-cors.headers.accesscontrolallowcredentials=true
      - traefik.http.middlewares.demo-sec.headers.stsSeconds=31536000
      - traefik.http.middlewares.demo-sec.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.demo-sec.headers.stsPreload=true
      - traefik.http.middlewares.demo-sec.headers.forceSTSHeader=true
      - traefik.http.middlewares.demo-ws.headers.customrequestheaders.Connection=Upgrade
      - traefik.http.middlewares.demo-ws.headers.customrequestheaders.Upgrade=websocket
      - traefik.http.routers.demo-api.middlewares=demo-cors,demo-sec,demo-ws
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', '--tries=1', 'http://127.0.0.1:3001/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 50s

  frontend:
    image: ${DEMO_FRONTEND_IMAGE:?set DEMO_FRONTEND_IMAGE to your product frontend image}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_UPSTREAM_URL: http://backend:3001
      NEXT_PUBLIC_APP_URL: https://${DEMO_APP_HOST}
      NEXT_PUBLIC_API_URL: https://${DEMO_API_HOST}
      NEXT_PUBLIC_WS_URL: wss://${DEMO_API_HOST}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.demo-app.rule=Host(`${DEMO_APP_HOST}`)
      - traefik.http.routers.demo-app.entrypoints=websecure
      - traefik.http.routers.demo-app.tls.certresolver=letsencrypt
      - traefik.http.services.demo-app.loadbalancer.server.port=3000

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - traefik-public
      - quokkaq-network

  demo-scheduler:
    profiles: ['scheduler']
    build:
      context: ../..
      dockerfile: deploy/demo/Dockerfile.scheduler
    restart: unless-stopped
    group_add:
      - "${DOCKER_GID:-999}"
    environment:
      COMPOSE_PROJECT_NAME: quokkaq-demo
      COMPOSE_DIR: /repo/deploy/demo
    volumes:
      - ../..:/repo:rw
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - quokkaq-network

networks:
  traefik-public:
    driver: bridge
  quokkaq-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  traefik_letsencrypt:
